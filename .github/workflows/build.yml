name: Build NEMESIS Agent

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build NEMESIS TUI (Core 2 Duo / antiX)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libssl-dev \
            libprotobuf-dev \
            protobuf-compiler \
            git \
            curl

      - name: Install dotslash (required for protoc)
        run: cargo install dotslash

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Configure Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Build NEMESIS (Core 2 Duo / antiX compatible)
        env:
          # Core 2 Duo compatible: x86_64 baseline, no AVX instructions
          # This ensures compatibility with older CPUs
          RUSTFLAGS: "-C target-cpu=x86-64 -C target-feature=-avx,-avx2,-sse4.2"
          PROTOC: "protoc --experimental_allow_proto3_optional"
        run: |
          cargo build --release --bin nemesis 2>&1

      - name: Prepare artifact
        run: |
          chmod +x target/release/nemesis
          ls -lh target/release/nemesis
          
          echo "=== Binary Info ==="
          file target/release/nemesis
          
          echo "=== Version ==="
          ./target/release/nemesis --version || echo "Version check done"
          
          echo "=== Required Libraries ==="
          ldd target/release/nemesis | head -20 || echo "ldd check done"

      - name: Upload NEMESIS binary
        uses: actions/upload-artifact@v4
        with:
          name: nemesis-agent-core2duo-antix
          path: target/release/nemesis
          retention-days: 30

      - name: Release summary
        if: success()
        run: |
          echo "## ✅ NEMESIS Agent Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Binary:** \`nemesis\`" >> $GITHUB_STEP_SUMMARY
          echo "**Target:** Core 2 Duo / Legacy x86_64 (antiX compatible)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Compatible Hardware:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Intel Core 2 Duo / Core 2 Quad (2006+)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ AMD Athlon 64 X2 / Phenom" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Any x86_64 CPU without AVX" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ antiX Linux, Debian stable, etc." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Usage:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "./nemesis" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
